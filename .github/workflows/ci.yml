name: MLOps CI Pipeline

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

env:
  PYTHON_VERSION: "3.11"
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ─── Code Quality ────────────────────────────────────────────────────────────
  lint-and-test:
    name: Lint & Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 black isort pytest-cov

      - name: Lint with flake8
        run: flake8 src/ api/ --max-line-length=120 --ignore=E501,W503

      - name: Check formatting with black
        run: black --check src/ api/ --line-length 120

      - name: Run unit tests
        run: |
          pytest tests/ -v --cov=src --cov=api \
            --cov-report=xml --cov-report=term-missing \
            -x --timeout=60
        env:
          CLICKHOUSE_HOST: localhost
          MLFLOW_TRACKING_URI: sqlite:///mlflow_test.db

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml

  # ─── Data Validation ─────────────────────────────────────────────────────────
  data-validation:
    name: DVC Pipeline + Data Validation
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Setup DVC
        run: |
          dvc init --no-scm || true
          dvc config core.autostage true

      - name: Copy raw data (CI environment)
        run: |
          mkdir -p data/raw
          cp "Raw_data_set/WA_Fn-UseC_-Telco-Customer-Churn.csv" data/raw/churn_raw.csv || true

      - name: Run data ingestion
        run: python -m src.data.ingest
        env:
          OPENLINEAGE_URL: ""

      - name: Run data validation
        run: python -m src.data.validate
        env:
          CLICKHOUSE_HOST: ""
          OPENLINEAGE_URL: ""

      - name: Run preprocessing
        run: python -m src.data.preprocess
        env:
          CLICKHOUSE_HOST: ""
          OPENLINEAGE_URL: ""

      - name: Upload validated data artifact
        uses: actions/upload-artifact@v4
        with:
          name: validated-data
          path: data/processed/
          retention-days: 7

  # ─── Model Training ───────────────────────────────────────────────────────────
  train-model:
    name: Train & Register Model
    runs-on: ubuntu-latest
    needs: data-validation
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download validated data
        uses: actions/download-artifact@v4
        with:
          name: validated-data
          path: data/processed/

      - name: Train model
        run: python -m src.models.train
        env:
          MLFLOW_TRACKING_URI: sqlite:///mlflow_ci.db
          CLICKHOUSE_HOST: ""
          OPENLINEAGE_URL: ""

      - name: Upload model artifact
        uses: actions/upload-artifact@v4
        with:
          name: trained-model
          path: artifacts/models/
          retention-days: 14

      - name: Upload training metrics
        uses: actions/upload-artifact@v4
        with:
          name: train-metrics
          path: artifacts/metrics/

  # ─── Docker Build & Push ──────────────────────────────────────────────────────
  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: train-model
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for API image
        id: meta-api
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/churn-api
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.api
          push: true
          tags: ${{ steps.meta-api.outputs.tags }}
          labels: ${{ steps.meta-api.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Extract metadata for Frontend image
        id: meta-fe
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/churn-frontend
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: docker/Dockerfile.frontend
          push: true
          tags: ${{ steps.meta-fe.outputs.tags }}
          labels: ${{ steps.meta-fe.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update K8s image tags
        run: |
          API_IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/churn-api:sha-${{ github.sha }}"
          FE_IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/churn-frontend:sha-${{ github.sha }}"
          
          # Update API deployment
          sed -i "s|image: .*churn-api.*|image: ${API_IMAGE}|g" k8s/api-deployment.yaml
          
          # Update Frontend deployment
          sed -i "s|image: .*churn-frontend.*|image: ${FE_IMAGE}|g" k8s/frontend-deployment.yaml
          
          # Commit and push changes
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add k8s/*.yaml
          git diff --staged --quiet || (git commit -m "ci: update image tags to sha-${{ github.sha }}" && git push)

  # ─── Promptfoo Evaluation ────────────────────────────────────────────────────
  promptfoo-eval:
    name: Promptfoo Model Evaluation
    runs-on: ubuntu-latest
    needs: train-model
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Promptfoo
        run: npm install -g promptfoo

      - name: Run Promptfoo evaluation
        run: promptfoo eval --config promptfoo/promptfooconfig.yaml --output promptfoo/results.json
        continue-on-error: true

      - name: Upload Promptfoo results
        uses: actions/upload-artifact@v4
        with:
          name: promptfoo-results
          path: promptfoo/results.json
