version: "3.8"

services:

  # ─── ClickHouse ─────────────────────────────────────────────────────────────
  clickhouse:
    image: clickhouse/clickhouse-server:24.3
    container_name: churn_clickhouse
    ports:
      - "8123:8123"   # HTTP interface
      - "9000:9000"   # Native TCP
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./clickhouse/init.sql:/docker-entrypoint-initdb.d/init.sql
    environment:
      CLICKHOUSE_DB: churn_mlops
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ""
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8123/ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - churn_net

  # ─── Marquez (OpenLineage backend) ──────────────────────────────────────────
  marquez:
    image: marquezproject/marquez:0.47.0
    container_name: churn_marquez
    ports:
      - "5000:5000"   # API
      - "5001:5001"   # Admin
    environment:
      MARQUEZ_CONFIG: /opt/marquez/marquez.dev.yml
    depends_on:
      marquez_db:
        condition: service_healthy
    volumes:
      - ./marquez/marquez.dev.yml:/opt/marquez/marquez.dev.yml
    networks:
      - churn_net
    restart: unless-stopped

  marquez_web:
    image: marquezproject/marquez-web:0.47.0
    container_name: churn_marquez_web
    ports:
      - "3000:3000"
    environment:
      MARQUEZ_HOST: marquez
      MARQUEZ_PORT: 5000
    depends_on:
      - marquez
    networks:
      - churn_net
    restart: unless-stopped

  marquez_db:
    image: postgres:14
    container_name: churn_marquez_db
    environment:
      POSTGRES_USER: marquez
      POSTGRES_PASSWORD: marquez
      POSTGRES_DB: marquez
    volumes:
      - marquez_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U marquez"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - churn_net
    restart: unless-stopped

  # ─── MLflow Tracking Server ──────────────────────────────────────────────────
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.12.2
    container_name: churn_mlflow
    ports:
      - "5001:5000"
    command: >
      mlflow server
      --backend-store-uri sqlite:///mlflow.db
      --default-artifact-root /mlflow/artifacts
      --host 0.0.0.0
      --port 5000
    volumes:
      - mlflow_data:/mlflow
    environment:
      MLFLOW_TRACKING_URI: http://0.0.0.0:5000
    networks:
      - churn_net
    restart: unless-stopped

  # ─── Prometheus ──────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: churn_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ../monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ../monitoring/prometheus/alert_rules.yml:/etc/prometheus/alert_rules.yml
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    networks:
      - churn_net
    restart: unless-stopped

  # ─── Grafana ────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.2
    container_name: churn_grafana
    ports:
      - "3002:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ../monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ../monitoring/grafana/datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml
    depends_on:
      - prometheus
    networks:
      - churn_net
    restart: unless-stopped

  # ─── FastAPI Model Server ────────────────────────────────────────────────────
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    container_name: churn_api
    ports:
      - "8000:8000"
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - CLICKHOUSE_HOST=clickhouse
      - CLICKHOUSE_PORT=8123
      - CLICKHOUSE_DATABASE=churn_mlops
      - CLICKHOUSE_USER=default
      - CLICKHOUSE_PASSWORD=
      - OPENLINEAGE_URL=http://marquez:5000
      - ENVIRONMENT=production
    depends_on:
      - mlflow
      - clickhouse
    volumes:
      - ./artifacts:/app/artifacts
    networks:
      - churn_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─── React Frontend ──────────────────────────────────────────────────────────
  frontend:
    build:
      context: ../frontend
      dockerfile: ../docker/Dockerfile.frontend
    container_name: churn_frontend
    ports:
      - "3001:80"
    environment:
      - REACT_APP_API_URL=http://localhost:8000
    depends_on:
      - api
    networks:
      - churn_net
    restart: unless-stopped

volumes:
  clickhouse_data:
  marquez_db_data:
  mlflow_data:
  prometheus_data:
  grafana_data:

networks:
  churn_net:
    driver: bridge
