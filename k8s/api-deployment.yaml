apiVersion: v1
kind: Namespace
metadata:
  name: churn-mlops
  labels:
    app: churn-mlops
    managed-by: argocd
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: churn-api
  namespace: churn-mlops
  labels:
    app: churn-api
    version: v1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: churn-api
  template:
    metadata:
      labels:
        app: churn-api
        version: v1
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: churn-api
          image: ghcr.io/spurthipendyala/customerchurn_prediction/churn-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          env:
            - name: MLFLOW_TRACKING_URI
              valueFrom:
                configMapKeyRef:
                  name: churn-config
                  key: MLFLOW_TRACKING_URI
            - name: CLICKHOUSE_HOST
              valueFrom:
                configMapKeyRef:
                  name: churn-config
                  key: CLICKHOUSE_HOST
            - name: ENVIRONMENT
              value: "production"
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "2Gi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: churn-api-svc
  namespace: churn-mlops
spec:
  selector:
    app: churn-api
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8000
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: churn-api-hpa
  namespace: churn-mlops
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: churn-api
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: churn-config
  namespace: churn-mlops
data:
  MLFLOW_TRACKING_URI: "http://mlflow-svc:5000"
  CLICKHOUSE_HOST: "clickhouse-svc"
  CLICKHOUSE_PORT: "8123"
  CLICKHOUSE_DATABASE: "churn_mlops"
  OPENLINEAGE_URL: "http://marquez-svc:5000"
  ENVIRONMENT: "production"
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: churn-ingress
  namespace: churn-mlops
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
    - host: churn-api.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: churn-api-svc
                port:
                  number: 80
    - host: churn-app.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: churn-frontend-svc
                port:
                  number: 80
